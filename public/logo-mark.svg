  <rect width="64" height="64" rx="18" fill="url(#lmBg)" filter="url(#lmDrop)"/>
  <rect x="5" y="5" width="54" height="26" rx="10" fill="url(#lmShine)"/>
  <circle cx="21" cy="24" r="7" fill="#ff6b6b"/>
